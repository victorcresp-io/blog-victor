{{- $destination := .Destination -}}
{{- if and (not (urls.Parse $destination).IsAbs) (not (hasPrefix $destination "/")) (hasPrefix $destination "images/") -}}
  {{- $destination = printf "/%s/%s" .Page.Section $destination | relURL -}}
{{- end -}}
<img
  src="{{ $destination | safeURL }}"
  alt="{{ .Text }}"
  {{- with .Title }} title="{{ . }}"{{ end -}}
  loading="lazy"
  decoding="async"
>
