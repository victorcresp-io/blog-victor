baseURL = "https://dataengineervictor.com/"
title = "Caderno Aberto"
defaultContentLanguage = "pt-br"
enableEmoji = true
enableRobotsTXT = true
summaryLength = 24

[module]
  [[module.imports]]
    path = "github.com/hugo-sid/hugo-blog-awesome"
    disable = false

[module.hugoVersion]
  extended = true
  min = "0.120.0"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[pagination]
  pagerSize = 6

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.pt-br]
    languageCode = "pt-BR"
    languageName = "Português"
    contentDir = "content"
    weight = 1
    [languages.pt-br.menu]
      [[languages.pt-br.menu.main]]
        pageRef = "/"
        name = "Início"
        url = "/"
        weight = 10
      [[languages.pt-br.menu.main]]
        pageRef = "posts"
        name = "Publicações"
        url = "/posts/"
        weight = 20
      [[languages.pt-br.menu.main]]
        pageRef = "about"
        name = "Sobre"
        url = "/about/"
        weight = 30

    [languages.pt-br.params]
      sitename = "Caderno Aberto"
      description = "Notas sobre tecnologia, criatividade e as coisas que aprendemos pelo caminho."
      mainSections = ["posts"]
      defaultColor = "auto"
      toc = true
      tocOpen = false
      goToTop = true
      dateFormat = "02/01/2006"
      rssFeedDescription = "summary"

      [languages.pt-br.params.author]
        intro = "Caderno Aberto"
        name = "Victor"
        description = "Ideias práticas sobre tecnologia, trabalho e criatividade — escritas sem pressa."

      [languages.pt-br.params.webmanifest]
        name = "Caderno Aberto"
        short_name = "Caderno"
        start_url = "/"
        theme_color = "#b45309"
        background_color = "#faf8f4"
        display = "standalone"

[params]
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/"
  [[params.socialIcons]]
    name = "Rss"
    url = "/index.xml"
